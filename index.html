<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chrome Extension Builder</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; max-width: 800px; }
h1, h2 { color: #333; }
input, textarea { width: 100%; margin: 5px 0; padding: 5px; font-family: monospace; }
textarea { height: 80px; }
.fileEntry { margin-bottom: 10px; }
button { margin-top: 10px; padding: 5px 10px; }
hr { margin: 15px 0; }
</style>
</head>
<body>

<h1>Chrome Extension Builder</h1>

<!-- Manifest Info -->
<h2>Manifest Info</h2>
<label>Name: <input type="text" id="extName" placeholder="My Extension"></label>
<label>Version: <input type="text" id="extVersion" value="1.0.0"></label>
<label>Description: <input type="text" id="extDesc" placeholder="Description"></label>

<hr>

<!-- Files Section -->
<h2>Files</h2>
<div id="fileContainer"></div>
<button id="addFileBtn">Add File</button>

<hr>

<button id="buildBtn">Build Extension ZIP</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="builder.js"></script>

</body>
</html>
